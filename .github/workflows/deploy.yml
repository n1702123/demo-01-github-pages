name: Deploy to GitHub Pages

on:
  push:
    branches: [main]       # push 到 main 時自動觸發

  workflow_dispatch:        # 也可以在 GitHub UI 手動觸發

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # 需要寫入權限才能推到 gh-pages branch

    steps:
      # Step 1: 把程式碼拉下來
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 安裝 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: 安裝相依套件
      - name: Install dependencies
        run: npm install

      # Step 4: Build 靜態檔案（輸出到 out/ 資料夾）
      - name: Build
        run: npm run build

      # Step 5: 把 out/ 的內容推到 gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
